name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel a run when a newer commit lands on the same branch/PR, but never
# across different branches/PRs — github.ref is unique per branch and per
# PR (refs/pull/<number>/merge), so unrelated runs never share a group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show versions
        run: swift --version && xcodebuild -version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      # macos-26 only ships iOS 26.x simulators; override the Makefile's
      # default iPhone 16 Pro/OS 18.5 destination, which isn't available here.
      - name: SportRecord package tests
        run: make test-sportrecord TEST_DEST='platform=iOS Simulator,name=iPhone 17,OS=26.5'

      - name: App target tests
        run: make test-app APP_TEST_DEST='platform=iOS Simulator,name=iPhone 17,OS=26.5'
