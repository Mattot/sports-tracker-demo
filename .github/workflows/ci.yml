name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show versions
        run: swift --version && xcodebuild -version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Core package tests
        run: make test-core

      - name: SportRecord package tests
        run: make test-sportrecord
